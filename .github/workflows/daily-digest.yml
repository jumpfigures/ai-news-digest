name: Daily AI News Digest

on:
  schedule:
    # GitHub cron is in UTC. WIB = UTC+7, so subtract 7 hours from the WIB time.
    #   07:00 WIB = 00:00 UTC   |   19:00 WIB = 12:00 UTC
    # (For WITA/UTC+8 subtract 8 hours; for WIT/UTC+9 subtract 9 hours.)
    # Note: scheduled runs can be delayed a few–30 min during GitHub peak load.
    - cron: '0 0 * * *'  # 07:00 WIB (pagi)
    - cron: '0 12 * * *' # 19:00 WIB (malam)
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

# Permissions required to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't let two runs deploy Pages at the same time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # safety net: auto-cancel if something hangs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node src/main.js

      - name: Current date
        id: date
        run: echo "today=$(date -u +'%A, %B %d, %Y')" >> "$GITHUB_OUTPUT"

      # Email failure should NOT block the website deploy, so allow it to fail.
      - name: Email the digest
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🗞️ AI News Digest — ${{ steps.date.outputs.today }}"
          to: ${{ secrets.MAIL_USERNAME }} # sends to yourself; hides the address from the public repo
          from: AI News Digest <${{ secrets.MAIL_USERNAME }}>
          html_body: file://output/daily.html
          attachments: output/daily.md

      - name: Prepare site
        run: |
          mkdir -p public
          cp output/daily.html public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: digest
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
