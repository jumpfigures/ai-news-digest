name: Daily Jumpfigure

on:
  schedule:
    # GitHub cron is in UTC. WIB = UTC+7, so subtract 7 hours from the WIB time.
    # The website (GitHub Pages) refreshes on EVERY run below. Email is sent ONLY
    # on the 00:00 / 12:00 UTC runs (07:00 / 19:00 WIB) — see the email step's `if`.
    # (Plus, the page itself auto-reloads every 60s in the browser.)
    # Note: scheduled runs can be delayed a few–30 min during GitHub peak load.
    - cron: '0 0 * * *'  # 07:00 WIB — site + EMAIL
    - cron: '0 6 * * *'  # 13:00 WIB — site only
    - cron: '0 12 * * *' # 19:00 WIB — site + EMAIL
    - cron: '0 16 * * *' # 23:00 WIB — site only
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

# Permissions required to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't let two runs deploy Pages at the same time.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # safety net: auto-cancel if something hangs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node src/main.js

      - name: Current date
        id: date
        run: echo "today=$(date -u +'%A, %B %d, %Y')" >> "$GITHUB_OUTPUT"

      # Send email ONLY on the 07:00 / 19:00 WIB runs (and any manual run).
      # Email failure should NOT block the website deploy, so allow it to fail.
      - name: Email the digest
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 0 * * *' || github.event.schedule == '0 12 * * *'
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🗞️ Jumpfigure — ${{ steps.date.outputs.today }}"
          to: ${{ secrets.MAIL_USERNAME }} # sends to yourself; hides the address from the public repo
          from: Jumpfigure <${{ secrets.MAIL_USERNAME }}>
          html_body: file://output/daily.html
          attachments: output/daily.md

      - name: Prepare site
        run: |
          mkdir -p public
          cp output/daily.html public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    needs: digest
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
