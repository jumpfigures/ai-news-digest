name: Daily AI News Digest

on:
  schedule:
    # GitHub cron is in UTC. 00:00 UTC = 07:00 WIB (Asia/Jakarta, UTC+7).
    #   - WITA (UTC+8, e.g. Bali/Makassar) 07:00  ->  '0 23 * * *'
    #   - WIT  (UTC+9, e.g. Papua)        07:00  ->  '0 22 * * *'
    # Note: scheduled runs can be delayed a few–30 min during GitHub peak load.
    - cron: '0 0 * * *'
  workflow_dispatch: {} # lets you trigger it manually from the Actions tab

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10 # safety net: auto-cancel if something hangs
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate digest
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node src/main.js

      - name: Current date
        id: date
        run: echo "today=$(date -u +'%A, %B %d, %Y')" >> "$GITHUB_OUTPUT"

      - name: Email the digest
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🗞️ AI News Digest — ${{ steps.date.outputs.today }}"
          to: corneliusedoward@gmail.com
          from: AI News Digest <${{ secrets.MAIL_USERNAME }}>
          html_body: file://output/daily.html
          attachments: output/daily.md
