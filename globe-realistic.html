<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth — Realistic Globe</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:#01030A;color:#dfeaf5;
    font-family:'Space Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  #scene{position:fixed;inset:0;display:block}
  #loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:#01030A;z-index:20;flex-direction:column;gap:16px;transition:opacity .8s}
  #loader .ring{width:34px;height:34px;border:2px solid rgba(120,170,220,.2);
    border-top-color:#5fb8e6;border-radius:50%;animation:spin 1s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #loader .t{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;color:#5d7c9c;text-transform:uppercase}
  .hud{position:fixed;inset:0;pointer-events:none;z-index:5}
  .corner{position:absolute;font-family:'JetBrains Mono',monospace;font-size:11px;
    letter-spacing:.14em;color:#7fa6c9;text-transform:uppercase}
  .tl{top:22px;left:24px}.tr{top:22px;right:24px;text-align:right}
  .bl{bottom:22px;left:24px}.br{bottom:22px;right:24px;text-align:right;color:#56789a}
  .wordmark{font-family:'Space Grotesk';font-weight:600;font-size:15px;letter-spacing:.32em;color:#eaf2fa}
  .wordmark .dot{color:#FFB020}
  .sub{margin-top:7px;color:#5d7c9c;font-size:10px}
  .live{display:inline-flex;align-items:center;gap:7px;color:#FFB020}
  .pulse{width:6px;height:6px;border-radius:50%;background:#FFB020;box-shadow:0 0 8px #FFB020;animation:blink 1.6s ease-in-out infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  .clock{font-size:22px;color:#eaf2fa;font-weight:500;letter-spacing:.05em}
  .nodes b{color:#eaf2fa;font-weight:500}
  .hint{bottom:22px;left:50%;transform:translateX(-50%);position:fixed;
    font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.18em;
    color:#3f5d7a;text-transform:uppercase;z-index:5;transition:opacity .6s;text-align:center}
  .vignette{position:fixed;inset:0;pointer-events:none;z-index:3;
    background:radial-gradient(circle at 50% 45%,transparent 50%,rgba(0,0,0,.5) 100%)}

  #labels{position:fixed;inset:0;z-index:4;pointer-events:none;overflow:hidden}
  .lbl{position:absolute;top:0;left:0;white-space:nowrap;will-change:transform,opacity;text-rendering:optimizeLegibility}
  .lbl.country{font-size:11px;color:#e3edf6;font-weight:500;letter-spacing:.01em;text-shadow:0 0 4px #000,0 0 8px rgba(0,0,0,.7),0 1px 2px #000}
  .lbl.sea{font-size:10px;color:#83b6da;font-style:italic;letter-spacing:.07em;text-shadow:0 0 6px rgba(0,0,0,.85)}
  .lbl.ocean{font-size:13px;color:#a3d0ea;text-transform:uppercase;letter-spacing:.3em;font-weight:500;text-shadow:0 0 8px rgba(0,0,0,.9)}
  .lbl.continent{font-size:16px;color:rgba(220,236,250,.32);text-transform:uppercase;letter-spacing:.42em;font-weight:600;text-shadow:0 0 10px rgba(0,0,0,.6)}
  .lbl.node{font-size:9.5px;color:#ffb24d;font-family:'JetBrains Mono',monospace;font-weight:500;letter-spacing:.03em;text-shadow:0 0 5px rgba(0,0,0,.95),0 0 9px rgba(247,147,26,.4)}
  #controls{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:7;pointer-events:auto;flex-wrap:wrap;justify-content:center;padding:0 12px;max-width:96vw}
  .chip{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:7px 12px;border:1px solid rgba(120,170,210,.25);background:rgba(8,18,30,.6);color:#5d7c9c;border-radius:20px;cursor:pointer;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:.2s;user-select:none}
  .chip.on{color:#cfe6f6;border-color:rgba(95,184,230,.6);box-shadow:0 0 12px rgba(95,184,230,.15)}
  .chip:hover{border-color:rgba(95,184,230,.5)}
  @media (max-width:600px){.clock{font-size:18px}.corner{font-size:10px}.br{display:none}.lbl.country{font-size:10px}}
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div class="vignette"></div>
<div id="loader"><div class="ring"></div><div class="t">Rendering Earth</div></div>
<div class="hud">
  <div class="corner tl"><div class="wordmark">JF<span class="dot">.</span>NODES</div><div class="sub">Bitcoin P2P Network</div></div>
  <div class="corner tr"><div class="live"><span class="pulse"></span>LIVE</div><div class="clock" id="clock">--:--:--</div><div class="sub">UTC</div></div>
  <div class="corner bl nodes"><div>NODES&nbsp; <b id="nodeCount">0</b></div><div class="sub">ROUTES&nbsp; <b id="routeCount" style="color:#eaf2fa">0</b> ACTIVE</div></div>
  <div class="corner br"><div>REACHABLE NODES</div><div class="sub">REPRESENTATIVE DISTRIBUTION</div></div>
</div>
<div id="labels"></div>
<div class="hint" id="hint" style="bottom:72px">Drag to rotate &middot; Scroll to zoom</div>
<div id="controls">
  <button data-k="country" class="chip on">Countries</button>
  <button data-k="sea" class="chip on">Seas</button>
  <button data-k="ocean" class="chip on">Oceans</button>
  <button data-k="continent" class="chip on">Continents</button>
  <button data-k="node" class="chip on">Nodes</button>
  <button data-k="routes" class="chip on">Network</button>
</div>

<script>
const TEX = JSON.parse(document.getElementById('texdata').textContent);
const PR = Math.min(window.devicePixelRatio, 2);
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

const canvas = document.getElementById('scene');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
renderer.setPixelRatio(PR); renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,0,13);

// tilt system: fixed axial tilt, then spinning world inside
const tiltGroup = new THREE.Group();
tiltGroup.rotation.z = 23.4*Math.PI/180;
scene.add(tiltGroup);
const world = new THREE.Group();
tiltGroup.add(world);

const R = 4, ATM = R*1.16;
const SUN = new THREE.Vector3(1.0, 0.32, 0.62).normalize();

function ll2v(lat, lon, radius){
  const phi=(90-lat)*Math.PI/180, theta=(lon+180)*Math.PI/180;
  return new THREE.Vector3(
    -radius*Math.sin(phi)*Math.cos(theta),
     radius*Math.cos(phi),
     radius*Math.sin(phi)*Math.sin(theta));
}

const loadMgr = new THREE.LoadingManager();
const tl = new THREE.TextureLoader(loadMgr);
const dayT  = tl.load(TEX.day);
const nightT= tl.load(TEX.night);
const specT = tl.load(TEX.spec);
[dayT,nightT,specT].forEach(t=>{t.anisotropy=4;t.wrapS=THREE.RepeatWrapping;});

/* ---- EARTH: custom day/night shader ---- */
const earthMat = new THREE.ShaderMaterial({
  uniforms:{
    dayTex:{value:dayT}, nightTex:{value:nightT}, specTex:{value:specT},
    sunDir:{value:SUN}
  },
  vertexShader:`
    varying vec2 vUv; varying vec3 vN; varying vec3 vWp;
    void main(){
      vUv = uv;
      vN = normalize(mat3(modelMatrix) * normal);
      vec4 wp = modelMatrix * vec4(position,1.0);
      vWp = wp.xyz;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }`,
  fragmentShader:`
    uniform sampler2D dayTex, nightTex, specTex;
    uniform vec3 sunDir;
    varying vec2 vUv; varying vec3 vN; varying vec3 vWp;
    void main(){
      vec3 N = normalize(vN);
      float cosA = dot(N, normalize(sunDir));
      vec3 day = texture2D(dayTex, vUv).rgb;
      vec3 night = texture2D(nightTex, vUv).rgb;
      float dayMix = smoothstep(-0.18, 0.22, cosA);
      float light = 0.18 + 1.05*max(cosA,0.0);
      vec3 col = mix(night*1.55, day*light, dayMix);
      // ocean specular glint
      float ocean = texture2D(specTex, vUv).r;
      vec3 V = normalize(cameraPosition - vWp);
      vec3 Rf = reflect(-normalize(sunDir), N);
      float s = pow(max(dot(Rf,V),0.0), 20.0) * ocean * dayMix;
      col += vec3(1.0,0.93,0.78) * s * 0.55;
      // subtle blue rim
      float rim = pow(1.0 - max(dot(N,V),0.0), 3.0);
      col += vec3(0.25,0.5,0.85) * rim * 0.18 * dayMix;
      gl_FragColor = vec4(col, 1.0);
    }`
});
const earth = new THREE.Mesh(new THREE.SphereGeometry(R,96,96), earthMat);
world.add(earth);

/* ---- ATMOSPHERE ---- */
const atmoMat = new THREE.ShaderMaterial({
  transparent:true, blending:THREE.AdditiveBlending, side:THREE.BackSide, depthWrite:false,
  uniforms:{glow:{value:new THREE.Color(0x3f8fe0)}, sunDir:{value:SUN}},
  vertexShader:`varying vec3 vN; varying vec3 vWp;
    void main(){ vN=normalize(mat3(modelMatrix)*normal);
      vec4 wp=modelMatrix*vec4(position,1.0); vWp=wp.xyz;
      gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`uniform vec3 glow; uniform vec3 sunDir; varying vec3 vN; varying vec3 vWp;
    void main(){ vec3 V=normalize(cameraPosition-vWp);
      float f=pow(1.0-abs(dot(normalize(vN),V)),3.2);
      float lit=0.35+0.65*max(dot(normalize(vN),normalize(sunDir)),0.0);
      gl_FragColor=vec4(glow, f*0.95*lit);}`
});
world.add(new THREE.Mesh(new THREE.SphereGeometry(ATM,64,64), atmoMat));

function glowTex(rgb){const c=document.createElement('canvas');c.width=c.height=64;
  const x=c.getContext('2d');const g=x.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(.25,rgb+',.85)');g.addColorStop(1,rgb+',0)');
  x.fillStyle=g;x.fillRect(0,0,64,64);return new THREE.CanvasTexture(c);}

// scatter individual nodes around each hub (count ~ weight)
const NODEPOS=[];
BTC_HUBS.forEach(h=>{const c=Math.max(1,Math.round(h.w));
  for(let k=0;k<c;k++){const sp=2.2+Math.random()*3.5;
    const jlat=h.lat+(Math.random()-0.5)*sp;
    const jlon=h.lon+(Math.random()-0.5)*sp/Math.max(0.3,Math.cos(h.lat*Math.PI/180));
    NODEPOS.push(ll2v(jlat,jlon,R*1.014));}});
const N=NODEPOS.length;

const overlay=new THREE.Group();world.add(overlay);

// node glow cloud
const nodeTex=glowTex('rgba(247,147,26');
(function(){const pos=new Float32Array(N*3);
  for(let i=0;i<N;i++){pos[i*3]=NODEPOS[i].x;pos[i*3+1]=NODEPOS[i].y;pos[i*3+2]=NODEPOS[i].z;}
  const geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  overlay.add(new THREE.Points(geo,new THREE.PointsMaterial({size:0.075,map:nodeTex,transparent:true,
    color:0xffae3c,opacity:0.95,depthWrite:false,blending:THREE.AdditiveBlending,sizeAttenuation:true})));})();

// P2P edges: nearest peer + random long-range links
const edges=[];
for(let i=0;i<N;i++){let bj=-1,bd=1e9;
  for(let j=0;j<N;j++){if(i===j)continue;const d=NODEPOS[i].distanceToSquared(NODEPOS[j]);if(d<bd){bd=d;bj=j;}}
  if(bj>=0) edges.push(i<bj?[i,bj]:[bj,i]);
  if(Math.random()<0.22){const r=(Math.random()*N)|0;if(r!==i)edges.push([i,r]);}}
(function(){const SEGN=18,pos=[],col=[];
  let ppx,ppy,ppz;
  for(let e=0;e<edges.length;e++){const a=NODEPOS[edges[e][0]],b=NODEPOS[edges[e][1]];
    const dist=a.distanceTo(b);
    const mx=(a.x+b.x)*0.5,my=(a.y+b.y)*0.5,mz=(a.z+b.z)*0.5;
    const ml=Math.hypot(mx,my,mz),k=(R*1.014+dist*0.32)/ml;
    const cx=mx*k,cy=my*k,cz=mz*k;
    for(let i=0;i<=SEGN;i++){const t=i/SEGN,it=1-t;
      const x=a.x*it*it+cx*2*it*t+b.x*t*t;
      const y=a.y*it*it+cy*2*it*t+b.y*t*t;
      const z=a.z*it*it+cz*2*it*t+b.z*t*t;
      if(i>0){const b0=Math.sin((t-1/SEGN)*Math.PI),b1=Math.sin(t*Math.PI);
        pos.push(ppx,ppy,ppz,x,y,z);
        col.push(1,0.6+0.28*b0,0.1, 1,0.6+0.28*b1,0.1);}
      ppx=x;ppy=y;ppz=z;}}
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(new Float32Array(pos),3));
  geo.setAttribute('color',new THREE.BufferAttribute(new Float32Array(col),3));
  overlay.add(new THREE.LineSegments(geo,new THREE.LineBasicMaterial({vertexColors:true,transparent:true,
    opacity:0.3,depthWrite:false,blending:THREE.AdditiveBlending})));})();

// traveling pulses (block/tx propagation)
const PULSE=90, pulses=[], pulsePos=new Float32Array(PULSE*3);
function newPulse(P){const e=edges[(Math.random()*edges.length)|0];
  P.a=NODEPOS[e[0]];P.b=NODEPOS[e[1]];
  P.mid=P.a.clone().add(P.b).multiplyScalar(0.5).setLength(R*1.014+P.a.distanceTo(P.b)*0.32);
  P.t=0;P.speed=0.15+Math.random()*0.28;return P;}
for(let p=0;p<PULSE;p++){const P=newPulse({});P.t=Math.random();pulses.push(P);}
const pulseGeo=new THREE.BufferGeometry();
pulseGeo.setAttribute('position',new THREE.BufferAttribute(pulsePos,3));
overlay.add(new THREE.Points(pulseGeo,new THREE.PointsMaterial({size:0.14,map:glowTex('rgba(255,214,150'),
  transparent:true,color:0xffffff,opacity:0.95,depthWrite:false,blending:THREE.AdditiveBlending,sizeAttenuation:true})));
const _qa=new THREE.Vector3(),_qb=new THREE.Vector3(),_qc=new THREE.Vector3();
function updatePulses(){for(let p=0;p<PULSE;p++){const P=pulses[p];
    P.t+=P.speed*(reduceMotion?0.3:1)*0.016; if(P.t>1)newPulse(P);
    const t=P.t,it=1-t;
    _qa.copy(P.a).multiplyScalar(it*it);_qb.copy(P.mid).multiplyScalar(2*it*t);_qc.copy(P.b).multiplyScalar(t*t);
    pulsePos[p*3]=_qa.x+_qb.x+_qc.x;pulsePos[p*3+1]=_qa.y+_qb.y+_qc.y;pulsePos[p*3+2]=_qa.z+_qb.z+_qc.z;}
  pulseGeo.attributes.position.needsUpdate=true;}
updatePulses();

document.getElementById('nodeCount').textContent=N.toLocaleString();
document.getElementById('routeCount').textContent=edges.length.toLocaleString();

const labelLayer=document.getElementById('labels');
const allLabels=[];
function addLabel(o,type){
  const el=document.createElement('div');
  el.className='lbl '+type; el.textContent=o.n; el.style.display='none';
  labelLayer.appendChild(el);
  const local=ll2v(o.lat,o.lon,R*1.004);
  let showUntil=999, farOnly=false;
  if(type==='sea') showUntil=15.5;
  else if(type==='continent') farOnly=true;
  else if(type==='node') showUntil=13;
  else if(type==='country'){const a=o.a;
    showUntil = a>300?999 : a>90?17 : a>28?13.5 : a>9?11 : a>2.2?9 : 7.4;}
  allLabels.push({el,local,type,showUntil,farOnly});
}
COUNTRIES.forEach(o=>addLabel(o,'country'));
SEAS.forEach(o=>addLabel(o,'sea'));
OCEANS.forEach(o=>addLabel(o,'ocean'));
CONTINENTS.forEach(o=>addLabel(o,'continent'));
BTC_HUBS.forEach(o=>addLabel(o,'node'));

const show={country:true,sea:true,ocean:true,continent:true,node:true};
const _wp=new THREE.Vector3(),_n=new THREE.Vector3(),_c=new THREE.Vector3(),_p=new THREE.Vector3();
function updateLabels(){
  const z=camera.position.z, W=innerWidth, H=innerHeight;
  for(let i=0;i<allLabels.length;i++){
    const L=allLabels[i], el=L.el;
    if(!show[L.type]){ if(el.style.display!=='none')el.style.display='none'; continue; }
    let base = z<=L.showUntil ? 1 : 0;
    if(L.farOnly) base = z>=12 ? Math.min(1,(z-12)/3) : 0;
    if(base<=0){ if(el.style.display!=='none')el.style.display='none'; continue; }
    _wp.copy(L.local).applyMatrix4(world.matrixWorld);
    _n.copy(_wp).normalize();
    _c.copy(camera.position).sub(_wp).normalize();
    const facing=_n.dot(_c);
    if(facing<=0.16){ if(el.style.display!=='none')el.style.display='none'; continue; }
    _p.copy(_wp).project(camera);
    if(_p.z>1){ if(el.style.display!=='none')el.style.display='none'; continue; }
    const sx=(_p.x*0.5+0.5)*W, sy=(-_p.y*0.5+0.5)*H;
    const fade=Math.min(1,(facing-0.16)/0.22);
    el.style.display='block';
    el.style.transform='translate('+sx.toFixed(1)+'px,'+sy.toFixed(1)+'px) translate(-50%,-50%)';
    el.style.opacity=(base*fade).toFixed(2);
  }
}

    pos[i*3]=r*Math.sin(p)*Math.cos(t);pos[i*3+1]=r*Math.sin(p)*Math.sin(t);pos[i*3+2]=r*Math.cos(p);}

/* ---- INTERACTION ---- */
let rotY=-2.2,rotX=0.15,velY=0,velX=0,dragging=false,lastX,lastY,autoSpin=reduceMotion?0:0.0009,targetZ=13;
function down(x,y){dragging=true;lastX=x;lastY=y;velY=velX=0;hideHint();}
function move(x,y){if(!dragging)return;velY=(x-lastX)*0.005;velX=(y-lastY)*0.005;rotY+=velY;rotX+=velX;lastX=x;lastY=y;}
function up(){dragging=false;}
canvas.addEventListener('mousedown',e=>down(e.clientX,e.clientY));
addEventListener('mousemove',e=>move(e.clientX,e.clientY));addEventListener('mouseup',up);
canvas.addEventListener('touchstart',e=>down(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
addEventListener('touchmove',e=>move(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
addEventListener('touchend',up);
canvas.addEventListener('wheel',e=>{e.preventDefault();targetZ=Math.max(6.2,Math.min(20,targetZ+e.deltaY*0.01));},{passive:false});
let hintGone=false;function hideHint(){if(hintGone)return;hintGone=true;document.getElementById('hint').style.opacity=0;}
setTimeout(hideHint,6500);

/* ---- CLOCK ---- */
const clock=document.getElementById('clock');
function tick(){const d=new Date(),p=n=>String(n).padStart(2,'0');
  clock.textContent=p(d.getUTCHours())+':'+p(d.getUTCMinutes())+':'+p(d.getUTCSeconds());}
setInterval(tick,1000);tick();

/* ---- LOADER ---- */
loadMgr.onLoad=()=>{const l=document.getElementById('loader');l.style.opacity=0;setTimeout(()=>l.remove(),800);};

/* ---- LOOP ---- */
let frame=0;
function animate(){requestAnimationFrame(animate);frame++;
  if(!dragging){rotY+=velY;rotX+=velX;velY*=0.94;velX*=0.94;rotY+=autoSpin;}
  rotX=Math.max(-1.1,Math.min(1.1,rotX));
  world.rotation.y=rotY;world.rotation.x=rotX;
  camera.position.z+=(targetZ-camera.position.z)*0.08;
  updatePulses();
  renderer.render(scene,camera);
  updateLabels();}
animate();
addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
