<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bitcoin · Global Node Network</title>
<style>
  :root{
    --bg:#05070d;
    --bg2:#0a0f1c;
    --land:#1c2a3a;
    --land-bright:#2b4258;
    --btc:#f7931a;
    --btc-hi:#ffb84d;
    --btc-glow:#ff9a1f;
    --ink:#e9f0f8;
    --dim:#5d7a99;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);}
  .stage{
    position:relative;width:100%;min-height:100vh;
    background:
      radial-gradient(120% 90% at 50% 8%, #0c1426 0%, #070b16 45%, #04060c 100%);
    overflow:hidden;
    font-family:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    color:var(--ink);
    display:flex;align-items:center;justify-content:center;
  }
  .map-wrap{position:relative;width:100%;}
  canvas{display:block;width:100%;height:auto;}

  /* chrome / overlay */
  .hud{position:absolute;inset:0;pointer-events:none;}
  .hud::before{content:'';position:absolute;top:0;left:0;right:0;height:150px;
    background:linear-gradient(to bottom, rgba(4,6,12,.62), rgba(4,6,12,0));}
  .hud::after{content:'';position:absolute;bottom:0;left:0;right:0;height:96px;
    background:linear-gradient(to top, rgba(4,6,12,.58), rgba(4,6,12,0));}
  .vignette{
    position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(115% 80% at 50% 45%, transparent 55%, rgba(2,4,9,.55) 100%);
    mix-blend-mode:multiply;
  }
  .scan{
    position:absolute;inset:0;pointer-events:none;opacity:.35;
    background:repeating-linear-gradient(to bottom, rgba(255,255,255,.025) 0 1px, transparent 1px 3px);
    mix-blend-mode:overlay;
  }

  .topbar{
    position:absolute;left:0;right:0;top:0;
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:clamp(14px,3vw,30px);
  }
  .brand{display:flex;align-items:center;gap:11px;}
  .glyph{
    width:26px;height:26px;border-radius:50%;
    background:radial-gradient(circle at 50% 40%, var(--btc-hi), var(--btc) 60%, #b86908 100%);
    box-shadow:0 0 14px rgba(247,147,26,.65),0 0 2px rgba(255,210,150,.9) inset;
    display:grid;place-items:center;color:#1a0d00;font-weight:800;font-size:15px;
    font-family:Georgia,serif;
  }
  .brand-txt{line-height:1.15;}
  .brand-txt .t1{font-size:clamp(12px,2.4vw,15px);letter-spacing:.32em;font-weight:600;}
  .brand-txt .t2{font-size:10px;letter-spacing:.34em;color:#728aa3;margin-top:3px;}

  .readout{text-align:right;font-size:10px;letter-spacing:.22em;color:#728aa3;}
  .readout .row{display:flex;gap:8px;justify-content:flex-end;margin-bottom:5px;}
  .readout b{color:var(--btc-hi);font-weight:600;font-variant-numeric:tabular-nums;}
  .live{display:inline-flex;align-items:center;gap:6px;color:#7fd1a0;}
  .live i{width:6px;height:6px;border-radius:50%;background:#54e08a;box-shadow:0 0 8px #54e08a;animation:blink 1.6s steps(2) infinite;}
  @keyframes blink{50%{opacity:.25}}

  .footnote{
    position:absolute;left:clamp(14px,3vw,30px);bottom:clamp(12px,2.6vw,26px);
    font-size:9.5px;letter-spacing:.26em;color:#46566b;max-width:60%;line-height:1.6;
  }
  .legend{
    position:absolute;right:clamp(14px,3vw,30px);bottom:clamp(12px,2.6vw,26px);
    font-size:9.5px;letter-spacing:.2em;color:#5d7a99;display:flex;gap:18px;
  }
  .legend span{display:inline-flex;align-items:center;gap:7px;color:#728aa3;}
  .legend .d{width:8px;height:8px;border-radius:50%;}
  .d.hub{background:var(--btc);box-shadow:0 0 8px var(--btc-glow);}
  .d.relay{background:#3c5a78;}
  .d.node{background:#7fb0d8;}

  @media (max-width:560px){
    .footnote{max-width:90%;}
    .legend{display:none;}
    .brand-txt .t2{display:none;}
  }
</style>

const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
const wrap = document.getElementById('wrap');
const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// fixed aspect from projection bounds
const ASPECT = (BOUNDS.lonMax-BOUNDS.lonMin) / (BOUNDS.latMax-BOUNDS.latMin); // ~2.59

let W=0, H=0, dpr=1;
let mapCanvas = document.createElement('canvas');
let mapCtx = mapCanvas.getContext('2d');

function project(lon, lat){
  const x = (lon-BOUNDS.lonMin)/(BOUNDS.lonMax-BOUNDS.lonMin)*W;
  const y = (BOUNDS.latMax-lat)/(BOUNDS.latMax-BOUNDS.latMin)*H;
  return [x,y];
}

function resize(){
  let cssW = wrap.clientWidth || wrap.getBoundingClientRect().width || window.innerWidth || 900;
  if(!cssW || cssW < 60) cssW = 900;
  W = cssW;
  H = cssW / ASPECT;
  dpr = Math.min(window.devicePixelRatio||1, 2);
  for(const c of [cv, mapCanvas]){
    c.width  = Math.round(W*dpr);
    c.height = Math.round(H*dpr);
  }
  cv.style.width = W+'px';
  cv.style.height = H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  mapCtx.setTransform(dpr,0,0,dpr,0,0);
  renderMap();
}

// ---- static base map: realistic earth texture + vignette + node halos ----
let earthReady=false;
const earth=new Image();
earth.onload=()=>{ earthReady=true; renderMap(); };
earth.src=EARTH_SRC;

function renderMap(){
  mapCtx.clearRect(0,0,W,H);

  if(earthReady){
    mapCtx.drawImage(earth,0,0,W,H);
  }else{
    mapCtx.fillStyle='#070d16'; mapCtx.fillRect(0,0,W,H);
  }

  // vignette to focus center + let glowing nodes pop
  const vg=mapCtx.createRadialGradient(W/2,H*0.46,Math.min(W,H)*0.18, W/2,H*0.46, Math.max(W,H)*0.72);
  vg.addColorStop(0,'rgba(2,5,11,0)');
  vg.addColorStop(0.7,'rgba(2,5,11,0.12)');
  vg.addColorStop(1,'rgba(2,5,11,0.62)');
  mapCtx.fillStyle=vg; mapCtx.fillRect(0,0,W,H);

  // ultra-faint graticule (chart overlay)
  mapCtx.strokeStyle='rgba(150,190,225,0.045)';
  mapCtx.lineWidth=1;
  for(let lon=BOUNDS.lonMin; lon<=BOUNDS.lonMax; lon+=30){
    const x=project(lon,0)[0];
    mapCtx.beginPath();mapCtx.moveTo(x,0);mapCtx.lineTo(x,H);mapCtx.stroke();
  }
  for(let lat=Math.ceil(BOUNDS.latMin/30)*30; lat<=BOUNDS.latMax; lat+=30){
    const y=project(0,lat)[1];
    mapCtx.beginPath();mapCtx.moveTo(0,y);mapCtx.lineTo(W,y);mapCtx.stroke();
  }

  // node base halos (soft)
  for(const n of NODES){
    const [x,y] = project(n.lon,n.lat);
    const rad = n.major? 26:16;
    const g = mapCtx.createRadialGradient(x,y,0,x,y,rad);
    g.addColorStop(0,'rgba(247,147,26,0.40)');
    g.addColorStop(1,'rgba(247,147,26,0)');
    mapCtx.fillStyle=g;
    mapCtx.beginPath(); mapCtx.arc(x,y,rad,0,7); mapCtx.fill();
  }
}

// ---- great circle ----
function gc(a, b, n=72){
  const toR=Math.PI/180;
  const la1=a.lat*toR, lo1=a.lon*toR, la2=b.lat*toR, lo2=b.lon*toR;
  const A=[Math.cos(la1)*Math.cos(lo1),Math.cos(la1)*Math.sin(lo1),Math.sin(la1)];
  const B=[Math.cos(la2)*Math.cos(lo2),Math.cos(la2)*Math.sin(lo2),Math.sin(la2)];
  let dot=A[0]*B[0]+A[1]*B[1]+A[2]*B[2];
  dot=Math.max(-1,Math.min(1,dot));
  const w=Math.acos(dot), sw=Math.sin(w);
  const pts=[];
  for(let i=0;i<=n;i++){
    const t=i/n;
    let s1,s2;
    if(sw<1e-6){s1=1-t;s2=t;}else{s1=Math.sin((1-t)*w)/sw;s2=Math.sin(t*w)/sw;}
    const x=s1*A[0]+s2*B[0], y=s1*A[1]+s2*B[1], z=s1*A[2]+s2*B[2];
    const lat=Math.asin(Math.max(-1,Math.min(1,z)))/toR;
    const lon=Math.atan2(y,x)/toR;
    pts.push({lon,lat});
  }
  return pts;
}

// ---- signals ----
const signals=[];
let relayTotal=0;
let blockHeight = 870000 + Math.floor(Math.random()*4000);

function spawn(){
  let s=Math.floor(Math.random()*NODES.length), d;
  do{ d=Math.floor(Math.random()*NODES.length);}while(d===s);
  // bias toward hubs as endpoints sometimes
  const path = gc(NODES[s], NODES[d], 80);
  const now = performance.now();
  const dur = 2400 + Math.random()*2600;
  signals.push({s,d,path,t0:now,dur,arrived:false,ring:0});
  relayTotal++;
}

  // strokes a sub-range of a projected polyline, splitting on antimeridian wrap
  let started=false;
  ctx.beginPath();
  let prev=null;
  for(let i=i0;i<=i1;i++){
    const p = (i===i1 && head)? head : projPts[i];
    if(prev && Math.abs(p[0]-prev[0])>W*0.5){
      ctx.stroke(); ctx.beginPath(); started=false;
    }
    if(!started){ctx.moveTo(p[0],p[1]);started=true;}
    else ctx.lineTo(p[0],p[1]);
    prev=p;
  }
  ctx.stroke();
}

function frame(now){
  ctx.clearRect(0,0,W,H);
  ctx.drawImage(mapCanvas,0,0,W,H);
  ctx.lineCap='round'; ctx.lineJoin='round';

  const activeLabels=new Map();

  for(let k=signals.length-1;k>=0;k--){
    const sig=signals[k];
    const prog=Math.max(0,Math.min(1,(now-sig.t0)/sig.dur));
    const N=sig.path.length;
    const proj=sig.path.map(p=>project(p.lon,p.lat));

    // faint full arc
    ctx.strokeStyle='rgba(247,147,26,0.10)';
    ctx.lineWidth=Math.max(0.7,W/1700);
    drawSegmented(proj,0,N-1,null);

    // head position
    const fpos=prog*(N-1);
    const hi=Math.max(0,Math.min(N-2,Math.floor(fpos)));
    const f=fpos-hi;
    const head=[ proj[hi][0]+(proj[hi+1][0]-proj[hi][0])*f,
                 proj[hi][1]+(proj[hi+1][1]-proj[hi][1])*f ];
    const wrapHead = Math.abs(proj[hi+1][0]-proj[hi][0])>W*0.5;
    const headPt = wrapHead? proj[hi] : head;

    // glowing trail (last ~14 points up to head)
    const trail=14;
    const start=Math.max(0,hi-trail);
    for(let i=start;i<hi;i++){
      const a=(i-start)/Math.max(1,(hi-start));
      if(Math.abs(proj[i+1][0]-proj[i][0])>W*0.5) continue;
      ctx.strokeStyle='rgba(255,170,60,'+(0.08+a*0.55)+')';
      ctx.lineWidth=Math.max(0.9,W/1500)*(0.5+a);
      ctx.beginPath();
      ctx.moveTo(proj[i][0],proj[i][1]);
      ctx.lineTo(proj[i+1][0],proj[i+1][1]);
      ctx.stroke();
    }
    if(!wrapHead){
      ctx.strokeStyle='rgba(255,200,110,0.9)';
      ctx.lineWidth=Math.max(1,W/1400);
      ctx.beginPath();ctx.moveTo(proj[hi][0],proj[hi][1]);ctx.lineTo(headPt[0],headPt[1]);ctx.stroke();
    }

    // comet head
    if(prog<1){
      const r=Math.max(2,W/600);
      const g=ctx.createRadialGradient(headPt[0],headPt[1],0,headPt[0],headPt[1],r*3.5);
      g.addColorStop(0,'rgba(255,236,200,1)');
      g.addColorStop(.4,'rgba(255,160,50,.8)');
      g.addColorStop(1,'rgba(255,150,40,0)');
      ctx.fillStyle=g;
      ctx.beginPath();ctx.arc(headPt[0],headPt[1],r*3.5,0,7);ctx.fill();
      ctx.fillStyle='#fff7ea';
      ctx.beginPath();ctx.arc(headPt[0],headPt[1],r*0.8,0,7);ctx.fill();
    }

    // arrival ring
    if(prog>=1){
      sig.ring += 0.045;
      const [dx,dy]=project(NODES[sig.d].lon,NODES[sig.d].lat);
      const rr=sig.ring*Math.max(14,W/55);
      const al=Math.max(0,0.5-sig.ring*0.5);
      ctx.strokeStyle='rgba(255,180,77,'+al+')';
      ctx.lineWidth=Math.max(1,W/1400);
      ctx.beginPath();ctx.arc(dx,dy,rr,0,7);ctx.stroke();
      if(sig.ring>1){signals.splice(k,1);}
    }

    // collect labels for endpoints
    const lifeIn = Math.min(1, prog*4);
    const lifeOut = prog>=1? Math.max(0,1-sig.ring) : 1;
    const lab = Math.min(lifeIn,lifeOut);
    activeLabels.set(sig.s, Math.max(activeLabels.get(sig.s)||0, lab));
    activeLabels.set(sig.d, Math.max(activeLabels.get(sig.d)||0, prog>=1?lab:Math.min(1,prog*1.5)));
  }

  // node cores + labels
  for(let i=0;i<NODES.length;i++){
    const n=NODES[i];
    const [x,y]=project(n.lon,n.lat);
    const pulse=0.5+0.5*Math.sin(now/650 + i);
    const core=(n.major?2.6:1.9)*Math.max(1,W/900);
    // ring
    ctx.strokeStyle='rgba(247,147,26,'+(0.25+pulse*0.25)+')';
    ctx.lineWidth=Math.max(0.8,W/1700);
    ctx.beginPath();ctx.arc(x,y,core*2.1,0,7);ctx.stroke();
    // core
    ctx.fillStyle='#ffd9a0';
    ctx.beginPath();ctx.arc(x,y,core,0,7);ctx.fill();
    ctx.fillStyle=n.major?'#f7931a':'#ffb84d';
    ctx.beginPath();ctx.arc(x,y,core*0.55,0,7);ctx.fill();

    const la=activeLabels.get(i)||0;
    if(la>0.02){
      ctx.font='600 '+Math.max(8,Math.round(W/110))+'px ui-monospace,Menlo,monospace';
      ctx.fillStyle='rgba(233,240,248,'+(0.85*la)+')';
      ctx.textBaseline='middle';
      const tw=ctx.measureText(n.name).width;
      const left = x>W-tw-18;
      ctx.textAlign=left?'right':'left';
      const ox=left? -core*2.6 : core*2.6;
      ctx.fillText(n.name, x+ox, y);
    }
  }

  // hud counters
  if(now-lastHud>120){
    rRelays.textContent = String(relayTotal).padStart(5,'0');
    lastHud=now;
  }

  if(!reduce) requestAnimationFrame(frame);
}

let lastHud=0;
const rNodes=document.getElementById('rNodes');
const rRelays=document.getElementById('rRelays');
const rBlock=document.getElementById('rBlock');
rNodes.textContent=String(NODES.length).padStart(2,'0');
rBlock.textContent=String(blockHeight);
setInterval(()=>{ blockHeight++; rBlock.textContent=String(blockHeight); }, 9500);

const ro=new ResizeObserver(()=>resize());
ro.observe(wrap);
resize();
window.addEventListener('load', resize);
setTimeout(resize, 80);
setTimeout(resize, 400);

if(reduce){
  // static frame: a few arcs frozen mid-flight
  for(let i=0;i<8;i++) spawn();
  signals.forEach((s,idx)=>{ s.t0=performance.now()-s.dur*((idx+1)/10); });
  frame(performance.now());
}else{
  // staggered spawns
  for(let i=0;i<5;i++) setTimeout(spawn, i*350);
  setInterval(()=>{ if(signals.length<16) spawn(); }, 480);
  requestAnimationFrame(frame);
}
</script>
