}

function renderMap(){
  mapCtx.clearRect(0,0,W,H);
  // subtle equator-ish ambient already from bg; draw dots
  const r = Math.max(1.0, W/820);
  mapCtx.fillStyle = 'rgba(138,182,222,0.55)';
  for(let i=0;i<MAP_DOTS.length;i+=2){
    const lon = MAP_DOTS[i]/10, lat = MAP_DOTS[i+1]/10;
    const [x,y] = project(lon,lat);
    mapCtx.beginPath();
    mapCtx.arc(x,y,r,0,7);
    mapCtx.fill();
  }
  // node base halos (soft)
  for(const n of NODES){
    const [x,y] = project(n.lon,n.lat);
    const rad = n.major? 22:14;
    const g = mapCtx.createRadialGradient(x,y,0,x,y,rad);
    g.addColorStop(0,'rgba(247,147,26,0.28)');
    g.addColorStop(1,'rgba(247,147,26,0)');
    mapCtx.fillStyle=g;
    mapCtx.beginPath(); mapCtx.arc(x,y,rad,0,7); mapCtx.fill();
  }
}

// ---- great circle ----
function gc(a, b, n=72){
  const toR=Math.PI/180;
  const la1=a.lat*toR, lo1=a.lon*toR, la2=b.lat*toR, lo2=b.lon*toR;
  const A=[Math.cos(la1)*Math.cos(lo1),Math.cos(la1)*Math.sin(lo1),Math.sin(la1)];
  const B=[Math.cos(la2)*Math.cos(lo2),Math.cos(la2)*Math.sin(lo2),Math.sin(la2)];
  let dot=A[0]*B[0]+A[1]*B[1]+A[2]*B[2];
  dot=Math.max(-1,Math.min(1,dot));
  const w=Math.acos(dot), sw=Math.sin(w);
  const pts=[];
  for(let i=0;i<=n;i++){
    const t=i/n;
    let s1,s2;
    if(sw<1e-6){s1=1-t;s2=t;}else{s1=Math.sin((1-t)*w)/sw;s2=Math.sin(t*w)/sw;}
    const x=s1*A[0]+s2*B[0], y=s1*A[1]+s2*B[1], z=s1*A[2]+s2*B[2];
    const lat=Math.asin(Math.max(-1,Math.min(1,z)))/toR;
    const lon=Math.atan2(y,x)/toR;
    pts.push({lon,lat});
  }
  return pts;
}

// ---- signals ----
const signals=[];
let relayTotal=0;
let blockHeight = 870000 + Math.floor(Math.random()*4000);

function spawn(){
  let s=Math.floor(Math.random()*NODES.length), d;
  do{ d=Math.floor(Math.random()*NODES.length);}while(d===s);
  // bias toward hubs as endpoints sometimes
  const path = gc(NODES[s], NODES[d], 80);
  const now = performance.now();
  const dur = 2400 + Math.random()*2600;
  signals.push({s,d,path,t0:now,dur,arrived:false,ring:0});
  relayTotal++;
}

function drawSegmented(projPts, i0, i1, head){
  // strokes a sub-range of a projected polyline, splitting on antimeridian wrap
  let started=false;
  ctx.beginPath();
  let prev=null;
  for(let i=i0;i<=i1;i++){
    const p = (i===i1 && head)? head : projPts[i];
    if(prev && Math.abs(p[0]-prev[0])>W*0.5){
      ctx.stroke(); ctx.beginPath(); started=false;
    }
    if(!started){ctx.moveTo(p[0],p[1]);started=true;}
    else ctx.lineTo(p[0],p[1]);
    prev=p;
  }
  ctx.stroke();
}

function frame(now){
  ctx.clearRect(0,0,W,H);
  ctx.drawImage(mapCanvas,0,0,W,H);
  ctx.lineCap='round'; ctx.lineJoin='round';

  const activeLabels=new Map();

  for(let k=signals.length-1;k>=0;k--){
    const sig=signals[k];
    const prog=Math.max(0,Math.min(1,(now-sig.t0)/sig.dur));
    const N=sig.path.length;
    const proj=sig.path.map(p=>project(p.lon,p.lat));

    // faint full arc
    ctx.strokeStyle='rgba(247,147,26,0.10)';
    ctx.lineWidth=Math.max(0.7,W/1700);
    drawSegmented(proj,0,N-1,null);

    // head position
    const fpos=prog*(N-1);
    const hi=Math.max(0,Math.min(N-2,Math.floor(fpos)));
    const f=fpos-hi;
    const head=[ proj[hi][0]+(proj[hi+1][0]-proj[hi][0])*f,
                 proj[hi][1]+(proj[hi+1][1]-proj[hi][1])*f ];
    const wrapHead = Math.abs(proj[hi+1][0]-proj[hi][0])>W*0.5;
    const headPt = wrapHead? proj[hi] : head;

    // glowing trail (last ~14 points up to head)
    const trail=14;
    const start=Math.max(0,hi-trail);
    for(let i=start;i<hi;i++){
      const a=(i-start)/Math.max(1,(hi-start));
      if(Math.abs(proj[i+1][0]-proj[i][0])>W*0.5) continue;
      ctx.strokeStyle='rgba(255,170,60,'+(0.08+a*0.55)+')';
      ctx.lineWidth=Math.max(0.9,W/1500)*(0.5+a);
      ctx.beginPath();
      ctx.moveTo(proj[i][0],proj[i][1]);
      ctx.lineTo(proj[i+1][0],proj[i+1][1]);
      ctx.stroke();
    }
    if(!wrapHead){
      ctx.strokeStyle='rgba(255,200,110,0.9)';
      ctx.lineWidth=Math.max(1,W/1400);
      ctx.beginPath();ctx.moveTo(proj[hi][0],proj[hi][1]);ctx.lineTo(headPt[0],headPt[1]);ctx.stroke();
    }

    // comet head
    if(prog<1){
      const r=Math.max(2,W/600);
      const g=ctx.createRadialGradient(headPt[0],headPt[1],0,headPt[0],headPt[1],r*3.5);
      g.addColorStop(0,'rgba(255,236,200,1)');
      g.addColorStop(.4,'rgba(255,160,50,.8)');
      g.addColorStop(1,'rgba(255,150,40,0)');
      ctx.fillStyle=g;
      ctx.beginPath();ctx.arc(headPt[0],headPt[1],r*3.5,0,7);ctx.fill();
      ctx.fillStyle='#fff7ea';
      ctx.beginPath();ctx.arc(headPt[0],headPt[1],r*0.8,0,7);ctx.fill();
    }

    // arrival ring
    if(prog>=1){
      sig.ring += 0.045;
      const [dx,dy]=project(NODES[sig.d].lon,NODES[sig.d].lat);
      const rr=sig.ring*Math.max(14,W/55);
      const al=Math.max(0,0.5-sig.ring*0.5);
      ctx.strokeStyle='rgba(255,180,77,'+al+')';
      ctx.lineWidth=Math.max(1,W/1400);
      ctx.beginPath();ctx.arc(dx,dy,rr,0,7);ctx.stroke();
      if(sig.ring>1){signals.splice(k,1);}
    }

    // collect labels for endpoints
    const lifeIn = Math.min(1, prog*4);
    const lifeOut = prog>=1? Math.max(0,1-sig.ring) : 1;
    const lab = Math.min(lifeIn,lifeOut);
    activeLabels.set(sig.s, Math.max(activeLabels.get(sig.s)||0, lab));
    activeLabels.set(sig.d, Math.max(activeLabels.get(sig.d)||0, prog>=1?lab:Math.min(1,prog*1.5)));
  }

  // node cores + labels
  for(let i=0;i<NODES.length;i++){
    const n=NODES[i];
    const [x,y]=project(n.lon,n.lat);
    const pulse=0.5+0.5*Math.sin(now/650 + i);
    const core=(n.major?2.6:1.9)*Math.max(1,W/900);
    // ring
    ctx.strokeStyle='rgba(247,147,26,'+(0.25+pulse*0.25)+')';
    ctx.lineWidth=Math.max(0.8,W/1700);
    ctx.beginPath();ctx.arc(x,y,core*2.1,0,7);ctx.stroke();
    // core
    ctx.fillStyle='#ffd9a0';
    ctx.beginPath();ctx.arc(x,y,core,0,7);ctx.fill();
    ctx.fillStyle=n.major?'#f7931a':'#ffb84d';
    ctx.beginPath();ctx.arc(x,y,core*0.55,0,7);ctx.fill();

    const la=activeLabels.get(i)||0;
    if(la>0.02){
      ctx.font='600 '+Math.max(8,Math.round(W/110))+'px ui-monospace,Menlo,monospace';
      ctx.fillStyle='rgba(233,240,248,'+(0.85*la)+')';
      ctx.textBaseline='middle';
      const tw=ctx.measureText(n.name).width;
      const left = x>W-tw-18;
      ctx.textAlign=left?'right':'left';
      const ox=left? -core*2.6 : core*2.6;
      ctx.fillText(n.name, x+ox, y);
    }
  }

  // hud counters
  if(now-lastHud>120){
    rRelays.textContent = String(relayTotal).padStart(5,'0');
    lastHud=now;
  }

  if(!reduce) requestAnimationFrame(frame);
}

let lastHud=0;
const rNodes=document.getElementById('rNodes');
const rRelays=document.getElementById('rRelays');
const rBlock=document.getElementById('rBlock');
rNodes.textContent=String(NODES.length).padStart(2,'0');
rBlock.textContent=String(blockHeight);
setInterval(()=>{ blockHeight++; rBlock.textContent=String(blockHeight); }, 9500);

const ro=new ResizeObserver(()=>resize());
ro.observe(wrap);
resize();
window.addEventListener('load', resize);
setTimeout(resize, 80);
setTimeout(resize, 400);

if(reduce){
  // static frame: a few arcs frozen mid-flight
  for(let i=0;i<8;i++) spawn();
  signals.forEach((s,idx)=>{ s.t0=performance.now()-s.dur*((idx+1)/10); });
  frame(performance.now());
}else{
  // staggered spawns
  for(let i=0;i<5;i++) setTimeout(spawn, i*350);
  setInterval(()=>{ if(signals.length<16) spawn(); }, 480);
  requestAnimationFrame(frame);
}
</script>
